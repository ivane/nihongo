<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語単語帳</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--card:#16213e;--accent:#e94560;--accent2:#0f3460;--text:#eaeaea;--dim:#8892b0;--green:#64ffda;--yellow:#ffd93d;--red:#ff6b6b}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1rem}
.header{text-align:center;padding:1.5rem 0;margin-bottom:1.5rem}
.header h1{font-size:2rem;background:linear-gradient(135deg,var(--accent),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--dim);margin-top:.3rem;font-size:.9rem}
.tabs{display:flex;gap:.5rem;justify-content:center;margin-bottom:1.5rem}
.tab{padding:.6rem 1.5rem;border-radius:25px;cursor:pointer;border:2px solid var(--accent2);background:transparent;color:var(--text);font-size:.95rem;transition:.3s}
.tab.active,.tab:hover{background:var(--accent);border-color:var(--accent);color:#fff}

.controls{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.controls input{flex:1;min-width:200px;padding:.6rem 1rem;border-radius:12px;border:2px solid var(--accent2);background:var(--card);color:var(--text);font-size:.95rem}
.controls input:focus{outline:none;border-color:var(--accent)}
.stats{color:var(--dim);font-size:.85rem;align-self:center;white-space:nowrap}
.view-toggle{display:flex;gap:.3rem;align-items:center}
.view-btn{padding:.3rem .6rem;border-radius:8px;cursor:pointer;border:1px solid var(--accent2);background:transparent;color:var(--dim);font-size:.8rem;transition:.2s}
.view-btn.active{background:var(--accent2);color:var(--text)}
.cat-filter{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap}
.cat-btn{padding:.35rem .9rem;border-radius:20px;cursor:pointer;border:1px solid var(--accent2);background:transparent;color:var(--dim);font-size:.8rem;transition:.2s;white-space:nowrap}
.cat-btn:hover,.cat-btn.active{background:var(--accent2);color:var(--text);border-color:var(--accent2)}
.cat-btn .cat-count{font-size:.7rem;opacity:.7;margin-left:.2rem}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem}
@media(max-width:680px){
  .word-grid{column-count:2;column-gap:.6rem;display:block}
  .word-card{break-inside:avoid;margin-bottom:.6rem;width:100%}
}
.word-card{background:var(--card);border-radius:16px;padding:1.2rem;border-left:4px solid var(--accent);transition:.3s}
.word-card:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.word-card .top-row{display:flex;justify-content:space-between;align-items:flex-start}
.word-card .kanji{font-size:1.8rem;font-weight:700}
.word-card .speak-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;padding:4px 8px;border-radius:8px;transition:.2s}
.word-card .speak-btn:hover{background:rgba(255,255,255,.1)}
.word-card .reading{color:var(--yellow);font-size:1.1rem;margin-bottom:.1rem}
.word-card .romaji{color:var(--dim);font-size:.85rem;margin-bottom:.3rem;font-style:italic}
.word-card .meaning{color:var(--dim);margin-bottom:.6rem}
.word-card .examples{display:flex;flex-direction:column;gap:.4rem}
.word-card .example{background:rgba(255,255,255,.05);padding:.5rem .8rem;border-radius:8px;font-size:.9rem;line-height:1.5}
.word-card .example .ex-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.2rem}
.word-card .example .ex-scene{font-size:.7rem;color:var(--dim);opacity:.7}
.word-card .example .ex-speak{cursor:pointer;font-size:.85rem;padding:0 2px;opacity:.6;transition:.2s}
.word-card .example .ex-speak:hover{opacity:1;transform:scale(1.2)}
.word-card .example .jp{color:var(--green)}
.word-card .example .cn{color:var(--dim);font-size:.85rem}
.word-card .related{margin-top:.6rem;padding:.6rem .8rem;background:rgba(255,217,61,.08);border-left:3px solid var(--yellow);border-radius:0 8px 8px 0;font-size:.85rem;line-height:1.5}
.word-card .related .rel-word{color:var(--yellow);font-weight:600;cursor:pointer}
.word-card .related .rel-word:hover{text-decoration:underline}
.word-card .related .rel-diff{color:var(--dim);font-size:.82rem;margin-top:.3rem}
.word-card .date{color:var(--dim);font-size:.75rem;margin-top:.5rem;text-align:right}
.empty{text-align:center;padding:3rem;color:var(--dim);font-size:1.1rem}
table.word-table{width:100%;border-collapse:collapse;font-size:.9rem}
table.word-table thead{position:sticky;top:0;z-index:1}
table.word-table th{background:var(--accent2);color:var(--text);padding:.6rem .5rem;text-align:left;font-weight:600;white-space:nowrap}
table.word-table td{padding:.5rem;border-bottom:1px solid rgba(255,255,255,.06);vertical-align:top}
table.word-table tr:hover{background:rgba(255,255,255,.03)}
table.word-table .td-kanji{font-weight:700;white-space:nowrap}
table.word-table .td-kana{color:var(--yellow);white-space:nowrap}
table.word-table .td-romaji{color:var(--dim);font-style:italic;font-size:.8rem;white-space:nowrap}
table.word-table .td-meaning{color:var(--dim)}
table.word-table .td-cat{font-size:.7rem;padding:1px 6px;border-radius:8px;background:rgba(255,255,255,.08);white-space:nowrap;display:inline-block}
table.word-table .td-date{color:var(--dim);font-size:.75rem;white-space:nowrap}
table.word-table .td-speak{cursor:pointer;font-size:.85rem;padding:2px;opacity:.6;transition:.2s}
table.word-table .td-speak:hover{opacity:1;transform:scale(1.2)}
table.word-table .td-related{font-size:.75rem;color:var(--yellow);cursor:pointer}
table.word-table .td-related:hover{text-decoration:underline}

/* 記憶モード */
.quiz-area{max-width:500px;margin:0 auto;text-align:center;padding:2rem 0}
.mode-tabs{display:flex;gap:.3rem;justify-content:center;margin-bottom:1.5rem}
.mode-tab{padding:.4rem 1rem;border-radius:15px;cursor:pointer;border:1px solid var(--dim);background:transparent;color:var(--dim);font-size:.85rem;transition:.2s}
.mode-tab.active{background:var(--accent2);color:var(--text);border-color:var(--accent2)}
.quiz-card{background:var(--card);border-radius:20px;padding:2.5rem;margin-bottom:1.5rem}
.quiz-card .prompt-label{color:var(--dim);font-size:.9rem;margin-bottom:.5rem}
.quiz-card .prompt{font-size:2.2rem;font-weight:700;margin-bottom:.5rem}
.quiz-card .hint{color:var(--dim);font-size:.95rem}
.quiz-card .example-display{margin-top:.8rem;padding:.6rem;background:rgba(100,255,218,.05);border-radius:10px;font-size:.9rem;line-height:1.6}
.quiz-card .example-display .ex-label{color:var(--dim);font-size:.75rem;margin-bottom:.3rem}
.quiz-card .example-display .ex-jp{color:var(--green)}
.quiz-card .example-display .ex-cn{color:var(--dim);font-size:.85rem}
.quiz-hear-btn{background:none;border:1px solid var(--dim);color:var(--dim);padding:.3rem .8rem;border-radius:12px;cursor:pointer;font-size:.85rem;margin-top:.5rem;transition:.2s}
.quiz-hear-btn:hover{border-color:var(--text);color:var(--text)}
.mic-btn{width:80px;height:80px;border-radius:50%;border:3px solid var(--accent);background:transparent;color:var(--text);font-size:2rem;cursor:pointer;transition:.3s;margin:.5rem}
.mic-btn:hover{background:var(--accent);color:#fff}
.mic-btn.recording{background:var(--red);border-color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.result{padding:1rem;border-radius:12px;margin-top:1rem;font-size:1.1rem;font-weight:600}
.result.correct{background:rgba(100,255,218,.15);color:var(--green)}
.result.wrong{background:rgba(255,107,107,.15);color:var(--red)}
.result.show{background:rgba(255,217,61,.15);color:var(--yellow)}
.next-btn{padding:.8rem 2rem;border-radius:25px;border:none;background:var(--accent);color:#fff;font-size:1rem;cursor:pointer;transition:.3s;margin-top:.5rem}
.next-btn:hover{background:#d63851}
.score-bar{display:flex;justify-content:center;gap:2rem;color:var(--dim);margin-bottom:1rem}
.score-bar span{font-size:1rem}.score-bar .num{color:var(--text);font-weight:700}
.skip-btn{padding:.5rem 1.2rem;border-radius:15px;border:1px solid var(--dim);background:transparent;color:var(--dim);cursor:pointer;font-size:.85rem;margin-top:.5rem}
.skip-btn:hover{border-color:var(--text);color:var(--text)}
</style>
</head>
<body>

<div class="header">
  <h1>🇯🇵 日本語単語帳</h1>
  <p>多邻国学日语的好帮手</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('list')">📖 单词本</div>
  <div class="tab" onclick="switchTab('quiz')">🧠 记忆模式</div>
</div>

<div id="listView">
  <div class="controls">
    <input type="text" id="searchInput" placeholder="搜索单词/假名/罗马音/含义..." oninput="renderList()">
    <span class="stats" id="statsText">0 词</span>
    <div class="view-toggle">
      <div class="view-btn active" id="viewCard" onclick="setView('card')">🃏</div>
      <div class="view-btn" id="viewTable" onclick="setView('table')">📊</div>
    </div>
  </div>
  <div class="cat-filter" id="catFilter"></div>
  <div class="word-grid" id="wordGrid"></div>
  <table class="word-table" id="wordTable" style="display:none">
    <thead><tr><th></th><th>汉字</th><th>假名</th><th>罗马音</th><th>含义</th><th>分类</th><th>关联</th><th>日期</th></tr></thead>
    <tbody id="wordTableBody"></tbody>
  </table>
  <div class="empty" id="emptyMsg" style="display:none">还没有单词，在飞书对话中发给 Coding 添加吧 💬</div>
</div>

<div id="quizView" style="display:none">
  <div class="score-bar">
    <span>✅ <span class="num" id="correctCount">0</span></span>
    <span>❌ <span class="num" id="wrongCount">0</span></span>
    <span>📋 <span class="num" id="totalCount">0</span></span>
  </div>
  <div class="mode-tabs">
    <div class="mode-tab active" id="modeWord" onclick="setQuizMode('word')">🔤 单词跟读</div>
    <div class="mode-tab" id="modeSentence" onclick="setQuizMode('sentence')">💬 例句跟读</div>
  </div>
  <div class="quiz-area">
    <div class="quiz-card">
      <div class="prompt-label" id="quizLabel">请说出这个单词的日语</div>
      <div class="prompt" id="quizPrompt">—</div>
      <div class="hint" id="quizHint"></div>
      <button class="quiz-hear-btn" id="quizHearBtn" onclick="hearQuiz()" style="display:none">🔊 先听正确读音</button>
      <div class="example-display" id="quizExample" style="display:none">
        <div class="ex-label">完整例句</div>
        <div class="ex-jp" id="quizExJp"></div>
        <div class="ex-cn" id="quizExCn"></div>
      </div>
    </div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    <div id="recognized" style="margin-top:.5rem;color:var(--green);min-height:1.5rem"></div>
    <div class="result" id="quizResult" style="display:none"></div>
    <div style="margin-top:1rem">
      <button class="next-btn" id="nextBtn" onclick="nextWord()" style="display:none">下一个 ➜</button>
      <br>
      <button class="skip-btn" onclick="showAnswer()">不知道，看答案 👀</button>
    </div>
  </div>
</div>

<script>
let words = [];
let quizWords = [];
let currentIndex = 0;
let correct = 0, wrong = 0, total = 0;
let recognition = null;
let isRecording = false;
let activeCategory = '全部';
let quizMode = 'word'; // 'word' | 'sentence'
let viewMode = 'card'; // 'card' | 'table'

function setView(mode) {
  viewMode = mode;
  document.getElementById('viewCard').classList.toggle('active', mode==='card');
  document.getElementById('viewTable').classList.toggle('active', mode==='table');
  renderList();
}

// 五十音データ
const GOJUON = {
  clear:[
    {k:'あ',r:'a',cn:'阿'},{k:'い',r:'i',cn:'伊'},{k:'う',r:'u',cn:'宇'},{k:'え',r:'e',cn:'衣'},{k:'お',r:'o',cn:'於'},
    {k:'か',r:'ka',cn:'加'},{k:'き',r:'ki',cn:'几'},{k:'く',r:'ku',cn:'久'},{k:'け',r:'ke',cn:'计'},{k:'こ',r:'ko',cn:'己'},
    {k:'さ',r:'sa',cn:'佐'},{k:'し',r:'shi',cn:'之'},{k:'す',r:'su',cn:'须'},{k:'せ',r:'se',cn:'世'},{k:'そ',r:'so',cn:'曾'},
    {k:'た',r:'ta',cn:'太'},{k:'ち',r:'chi',cn:'知'},{k:'つ',r:'tsu',cn:'川'},{k:'て',r:'te',cn:'天'},{k:'と',r:'to',cn:'止'},
    {k:'な',r:'na',cn:'奈'},{k:'に',r:'ni',cn:'仁'},{k:'ぬ',r:'nu',cn:'奴'},{k:'ね',r:'ne',cn:'祢'},{k:'の',r:'no',cn:'乃'},
    {k:'は',r:'ha',cn:'波'},{k:'ひ',r:'hi',cn:'比'},{k:'ふ',r:'fu',cn:'不'},{k:'へ',r:'he',cn:'部'},{k:'ほ',r:'ho',cn:'保'},
    {k:'ま',r:'ma',cn:'末'},{k:'み',r:'mi',cn:'美'},{k:'む',r:'mu',cn:'武'},{k:'め',r:'me',cn:'女'},{k:'も',r:'mo',cn:'毛'},
    {k:'や',r:'ya',cn:'也'},{k:'ゆ',r:'yu',cn:'由'},{k:'よ',r:'yo',cn:'与'},
    {k:'ら',r:'ra',cn:'良'},{k:'り',r:'ri',cn:'利'},{k:'る',r:'ru',cn:'留'},{k:'れ',r:'re',cn:'礼'},{k:'ろ',r:'ro',cn:'吕'},
    {k:'わ',r:'wa',cn:'和'},{k:'を',r:'wo',cn:'远'},{k:'ん',r:'n',cn:'无'}
  ],
  dakuten:[
    {k:'が',r:'ga',cn:'我'},{k:'ぎ',r:'gi',cn:'义'},{k:'ぐ',r:'gu',cn:'具'},{k:'げ',r:'ge',cn:'艺'},{k:'ご',r:'go',cn:'御'},
    {k:'ざ',r:'za',cn:'座'},{k:'じ',r:'ji',cn:'治'},{k:'ず',r:'zu',cn:'寿'},{k:'ぜ',r:'ze',cn:'膳'},{k:'ぞ',r:'zo',cn:'藏'},
    {k:'だ',r:'da',cn:'駄'},{k:'ぢ',r:'di',cn:'地'},{k:'づ',r:'du',cn:'豆'},{k:'で',r:'de',cn:'出'},{k:'ど',r:'do',cn:'度'},
    {k:'ば',r:'ba',cn:'马'},{k:'び',r:'bi',cn:'美'},{k:'ぶ',r:'bu',cn:'武'},{k:'べ',r:'be',cn:'部'},{k:'ぼ',r:'bo',cn:'保'},
    {k:'ぱ',r:'pa',cn:'怕'},{k:'ぴ',r:'pi',cn:'批'},{k:'ぷ',r:'pu',cn:'普'},{k:'ぺ',r:'pe',cn:'佩'},{k:'ぽ',r:'po',cn:'保'}
  ],
  combo:[
    {k:'きゃ',r:'kya',cn:'kiya'},{k:'きゅ',r:'kyu',cn:'kyu'},{k:'きょ',r:'kyo',cn:'kyo'},
    {k:'しゃ',r:'sha',cn:'sha'},{k:'しゅ',r:'shu',cn:'shu'},{k:'しょ',r:'sho',cn:'sho'},
    {k:'ちゃ',r:'cha',cn:'cha'},{k:'ちゅ',r:'chu',cn:'chu'},{k:'ちょ',r:'cho',cn:'cho'},
    {k:'にゃ',r:'nya',cn:'nya'},{k:'にゅ',r:'nyu',cn:'nyu'},{k:'にょ',r:'nyo',cn:'nyo'},
    {k:'ひゃ',r:'hya',cn:'hya'},{k:'ひゅ',r:'hyu',cn:'hyu'},{k:'ひょ',r:'hyo',cn:'hyo'},
    {k:'みゃ',r:'mya',cn:'mya'},{k:'みゅ',r:'myu',cn:'myu'},{k:'みょ',r:'myo',cn:'myo'},
    {k:'りゃ',r:'rya',cn:'rya'},{k:'りゅ',r:'ryu',cn:'ryu'},{k:'りょ',r:'ryo',cn:'ryo'}
  ]
};
const ALL_GOJUON = [...GOJUON.clear,...GOJUON.dakuten,...GOJUON.combo];

// 读音合成
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 0.8;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// 単語データ読み込み
async function loadWords() {
  const resp = await fetch('words.json');
  words = await resp.json();
  renderList();
}

// タブ切替
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='list'?i===0:i===1)));
  document.getElementById('listView').style.display = tab==='list'?'block':'none';
  document.getElementById('quizView').style.display = tab==='quiz'?'block':'none';
  if (tab === 'quiz') startQuiz();
}

// 例句HTML生成
function escJp(s){return s.replace(/'/g,"\\'").replace(/\n/g,'')}
function renderExamples(examples) {
  if (!examples) return '';
  if (Array.isArray(examples)) {
    return examples.map((e,i) => `
      <div class="example">
        <div class="ex-top"><span class="ex-scene">${e.scene||''}</span><span class="ex-speak" onclick="speak('${escJp(e.jp)}')" title="朗读">🔊</span></div>
        <div class="jp">${e.jp}</div>
        <div class="cn">${e.cn}</div>
      </div>`).join('');
  }
  return `<div class="example">
    <div class="ex-top"><span class="ex-speak" onclick="speak('${escJp(examples.jp)}')" title="朗读">🔊</span></div>
    <div class="jp">${examples.jp}</div>
    <div class="cn">${examples.cn}</div>
  </div>`;
}

// 分類フィルタ
const CATEGORIES = ['全部','📅 日期','🔢 数字','🚌 交通','✈️ 旅游必懂','🍜 食物','👔 日常','📦 其他'];
function renderCatFilter() {
  const catCounts = {};
  words.forEach(w => { const c = w.category || '其他'; catCounts[c] = (catCounts[c]||0)+1; });
  document.getElementById('catFilter').innerHTML = CATEGORIES.map(c => {
    const name = c.replace(/^[^\s]+\s/, '');
    const count = name === '全部' ? words.length : (catCounts[name]||0);
    return `<div class="cat-btn${activeCategory===name?' active':''}" onclick="filterCat('${name}')">${c}${count>0?`<span class="cat-count">${count}</span>`:''}</div>`;
  }).join('');
}
function filterCat(cat) { activeCategory = cat; renderCatFilter(); renderList(); }

// リスト描画
function renderList() {
  renderCatFilter();
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = words.filter(w =>
    w.kanji.toLowerCase().includes(q) ||
    (w.kana||w.reading).toLowerCase().includes(q) ||
    (w.romaji||'').toLowerCase().includes(q) ||
    w.meaning.toLowerCase().includes(q)
  );
  if (activeCategory !== '全部') filtered = filtered.filter(w => (w.category||'其他') === activeCategory);
  const grid = document.getElementById('wordGrid');
  const empty = document.getElementById('emptyMsg');
  document.getElementById('statsText').textContent = words.length + ' 词';
  if (!filtered.length) { grid.innerHTML=''; tbody.innerHTML=''; document.getElementById('wordGrid').style.display='none'; document.getElementById('wordTable').style.display='none'; empty.style.display='block'; return; }
  empty.style.display = 'none';
  const sorted = [...filtered].sort((a,b) => (b.added||'').localeCompare(a.added||''));

  if (viewMode === 'table') {
    document.getElementById('wordGrid').style.display = 'none';
    document.getElementById('wordTable').style.display = 'table';
    document.getElementById('wordTableBody').innerHTML = sorted.map(w => `<tr>
      <td><span class="td-speak" onclick="speak('${w.kanji}')" title="朗读">🔊</span></td>
      <td class="td-kanji">${w.kanji}</td>
      <td class="td-kana">${w.kana||w.reading||''}</td>
      <td class="td-romaji">${w.romaji||''}</td>
      <td class="td-meaning">${w.meaning}</td>
      <td><span class="td-cat">${w.category||''}</span></td>
      <td>${w.related?`<span class="td-related" onclick="document.getElementById('searchInput').value='${w.related.word}';renderList()">🔗${w.related.word}</span>`:''}</td>
      <td class="td-date">${w.added||''}</td>
    </tr>`).join('');
  } else {
    document.getElementById('wordGrid').style.display = 'grid';
    document.getElementById('wordTable').style.display = 'none';
  grid.innerHTML = sorted.map(w => `
    <div class="word-card">
      <div class="top-row">
        <div class="kanji">${w.kanji}</div>
        <button class="speak-btn" onclick="speak('${w.kanji}')" title="朗读">🔊</button>
      </div>
      <div class="reading">${w.kana || w.reading}</div>
      <div class="romaji">${w.romaji||''}</div>
      <div class="meaning">${w.meaning} ${w.category?`<span style="font-size:.7rem;padding:1px 6px;border-radius:8px;background:rgba(255,255,255,.1);margin-left:.3rem">${w.category}</span>`:''}</div>
      <div class="examples">${renderExamples(w.examples || w.example)}</div>
      ${w.related ? `<div class="related"><span class="rel-word" onclick="document.getElementById('searchInput').value='${w.related.word}';renderList()">🔗 ${w.related.word}（${w.related.kana}）</span><div class="rel-diff">${w.related.difference}</div></div>` : ''}
      <div class="date">${w.added||''}</div>
    </div>
  `).join('');
  }
}

// ===== 記憶モード =====

function setQuizMode(mode) {
  quizMode = mode;
  document.getElementById('modeWord').classList.toggle('active', mode==='word');
  document.getElementById('modeSentence').classList.toggle('active', mode==='sentence');
  startQuiz();
}

function startQuiz() {
  if (!words.length && !ALL_GOJUON.length) return;
  correct = 0; wrong = 0; total = 0; updateScore();
  buildQuizPool();
  nextWord();
}

function buildQuizPool() {
  const oneMonthAgo = new Date();
  oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);
  const travel = words.filter(w => w.category === '旅游必懂');
  const others = words.filter(w => w.category !== '旅游必懂');
  const newTravel = travel.filter(w => new Date(w.added) >= oneMonthAgo);
  const oldTravel = travel.filter(w => new Date(w.added) < oneMonthAgo);
  const newOthers = others.filter(w => new Date(w.added) >= oneMonthAgo);
  const oldOthers = others.filter(w => new Date(w.added) < oneMonthAgo);

  if (quizMode === 'sentence') {
    // 例句跟读模式：从有例句的词中随机抽例句
    const allEx = [];
    words.forEach(w => {
      (w.examples || []).forEach(e => {
        allEx.push({ word: w, example: e });
      });
    });
    quizWords = shuffle(allEx).slice(0, 20);
    quizWords.forEach(q => { q.isSentence = true; q.isNew = new Date(q.word.added) >= oneMonthAgo; });
    currentIndex = 0;
    return;
  }

  // 单词跟读模式
  const wordPool = [];
  shuffle(newTravel).slice(0, 4).forEach(w => wordPool.push({...w, isNew: true}));
  shuffle(oldTravel).slice(0, 3).forEach(w => wordPool.push({...w, isNew: false}));
  shuffle(newOthers).slice(0, 2).forEach(w => wordPool.push({...w, isNew: true}));
  shuffle(oldOthers).slice(0, 1).forEach(w => wordPool.push({...w, isNew: false}));
  const gojuonPool = shuffle(ALL_GOJUON).slice(0, 10).map(g => ({
    kanji: g.k, reading: g.r, meaning: g.cn, examples: [], isNew: false, isKana: true
  }));
  quizWords = shuffle([...wordPool, ...gojuonPool]);
  currentIndex = 0;
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function nextWord() {
  if (!quizWords.length) { buildQuizPool(); }
  if (currentIndex >= quizWords.length) {
    document.getElementById('quizPrompt').textContent = '🎉 本轮结束！';
    document.getElementById('quizHint').textContent = `正确 ${correct}/${total}，错误 ${wrong}/${total}`;
    document.getElementById('quizLabel').textContent = '点击下方按钮再来一轮';
    document.getElementById('quizResult').style.display = 'none';
    document.getElementById('recognized').textContent = '';
    document.getElementById('quizHearBtn').style.display = 'none';
    document.getElementById('quizExample').style.display = 'none';
    document.getElementById('micBtn').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'inline-block';
    document.getElementById('nextBtn').textContent = '再来一轮 🔄';
    document.getElementById('nextBtn').onclick = () => {
      startQuiz();
      document.getElementById('micBtn').style.display = '';
      document.getElementById('nextBtn').textContent = '下一个 ➜';
      document.getElementById('nextBtn').onclick = nextWord;
    };
    return;
  }

  const q = quizWords[currentIndex];
  document.getElementById('quizResult').style.display = 'none';
  document.getElementById('recognized').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('micBtn').style.display = '';
  document.getElementById('micBtn').classList.remove('recording');

  if (q.isSentence) {
    // 例句跟读
    document.getElementById('quizLabel').textContent = '请跟读这个例句';
    document.getElementById('quizPrompt').textContent = q.example.cn;
    document.getElementById('quizHint').textContent = `${q.word.kanji}（${q.word.kana||q.word.reading}）` + (q.isNew ? ' 🆕 新词' : ' 📝 复习');
    document.getElementById('quizHearBtn').style.display = 'inline-block';
    document.getElementById('quizExample').style.display = 'none';
  } else {
    document.getElementById('quizLabel').textContent = '请说出这个单词的日语';
    document.getElementById('quizPrompt').textContent = q.meaning;
    document.getElementById('quizHint').textContent = q.isKana ? '🔤 五十音' : (q.isNew ? '🆕 新词' : '📝 复习');
    document.getElementById('quizHearBtn').style.display = 'inline-block';
    document.getElementById('quizExample').style.display = 'none';
  }
}

function hearQuiz() {
  const q = quizWords[currentIndex];
  if (q.isSentence) {
    speak(q.example.jp);
  } else {
    speak(q.kanji);
  }
}

function showAnswer() {
  const q = quizWords[currentIndex];
  let answer, hint;
  if (q.isSentence) {
    answer = q.example.jp;
    hint = q.example.cn;
    document.getElementById('quizExJp').textContent = q.example.jp;
    document.getElementById('quizExCn').textContent = q.example.cn;
    document.getElementById('quizExample').style.display = 'block';
  } else {
    answer = `${q.kanji}（${q.reading}）`;
    hint = q.meaning;
  }
  document.getElementById('quizResult').textContent = `答案是：${answer}`;
  document.getElementById('quizResult').className = 'result show';
  document.getElementById('quizResult').style.display = 'block';
  wrong++; total++; updateScore();
  document.getElementById('nextBtn').style.display = 'inline-block';
  currentIndex++;
}

function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('你的浏览器不支持语音识别，请用 Chrome'); return;
  }
  if (isRecording) { recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.interimResults = false;
  recognition.maxAlternatives = 5;
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
  };
  recognition.onresult = (e) => {
    const results = e.results[0];
    const spoken = [];
    for (let i = 0; i < results.length; i++) spoken.push(results[i].transcript.trim());
    document.getElementById('recognized').textContent = '听到: ' + spoken.join(' / ');
    checkAnswer(spoken);
  };
  recognition.onerror = (e) => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    if (e.error === 'no-speech') document.getElementById('recognized').textContent = '没听清，再试一次';
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
  };
  recognition.start();
}

// 宽松匹配：去除助词/空格，比较核心假名
function normalize(s) {
  return s.replace(/[\s。、！？!?,.\-「」『』（）()]/g, '').replace(/^(が|は|を|に|で|と|の|も|へ|から|まで|を|が)$/g, '');
}

function fuzzyMatch(spoken, target) {
  const clean = normalize(spoken);
  const ans = normalize(target);
  if (clean === ans) return true;
  // 包含匹配
  if (clean.length >= 2 && (clean.includes(ans) || ans.includes(clean))) return true;
  // 去掉助词后再比较（日语语音识别常把助词识别不同）
  const cleanNoJoshi = clean.replace(/^(は|が|を|に|で|と|の|も|へ|って|には|では|とは|のも|にも|で も)$/, '');
  const ansNoJoshi = ans.replace(/^(は|が|を|に|で|と|の|も|へ|って|には|では|とは|のも|にも|でも)$/, '');
  if (cleanNoJoshi && ansNoJoshi && (cleanNoJoshi === ansNoJoshi || cleanNoJoshi.includes(ansNoJoshi) || ansNoJoshi.includes(cleanNoJoshi))) return true;
  return false;
}

function checkAnswer(spoken) {
  const q = quizWords[currentIndex];
  let targets, answerDisplay;

  if (q.isSentence) {
    targets = [q.example.jp];
    answerDisplay = q.example.jp;
  } else {
    targets = [q.kanji, q.kana || q.reading, (q.kana||q.reading||'').replace(/[。]$/, '')];
    answerDisplay = `${q.kanji}（${q.reading}）`;
  }

  const isCorrect = spoken.some(s => targets.some(t => fuzzyMatch(s, t)));
  const result = document.getElementById('quizResult');
  result.style.display = 'block';

  if (isCorrect) {
    result.textContent = `✅ 正确！${answerDisplay}`;
    result.className = 'result correct';
    correct++; total++;
    speak(q.isSentence ? q.example.jp : q.kanji);
  } else {
    result.textContent = `❌ 不对哦～ ${answerDisplay}`;
    result.className = 'result wrong';
    wrong++; total++;
    // 答错时自动播放正确读音，帮助学习
    speak(q.isSentence ? q.example.jp : q.kanji);
  }

  updateScore();
  document.getElementById('nextBtn').style.display = 'inline-block';
  currentIndex++;

  // 如果是例句模式，答完后显示完整例句
  if (q.isSentence) {
    document.getElementById('quizExJp').textContent = q.example.jp;
    document.getElementById('quizExCn').textContent = q.example.cn;
    document.getElementById('quizExample').style.display = 'block';
  }
}

function updateScore() {
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('totalCount').textContent = total;
}

loadWords();
setInterval(loadWords, 5000);
</script>
