<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語単語帳</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f2f5;--card:#ffffff;--accent:#5b5bd6;--accent2:#e8e8f0;--accent-hover:#4747b8;
  --text:#1a1a2e;--text-secondary:#5a5a7a;--dim:#8888a8;
  --green:#22c55e;--green-bg:rgba(34,197,94,.1);
  --yellow:#f59e0b;--yellow-bg:rgba(245,158,11,.1);
  --red:#ef4444;--red-bg:rgba(239,68,68,.1);
  --border:#e0e0ec;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --shadow-hover:0 4px 16px rgba(91,91,214,.15),0 8px 24px rgba(0,0,0,.08);
  --radius-card:18px;--radius-btn:12px;--radius-pill:999px;
  --t-bg:#12121e;--t-card:#1c1c2e;--t-accent:#7c7cff;--t-accent2:#2a2a42;--t-accent-hover:#9494ff;
  --t-text:#e8e8f4;--t-text-secondary:#a0a0c0;--t-dim:#6868a0;
  --t-green:#4ade80;--t-green-bg:rgba(74,222,128,.1);
  --t-yellow:#fbbf24;--t-yellow-bg:rgba(251,191,36,.1);
  --t-red:#f87171;--t-red-bg:rgba(248,113,113,.1);
  --t-border:#2a2a3e;
  --t-shadow:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
  --t-shadow-hover:0 4px 16px rgba(124,124,255,.15),0 8px 24px rgba(0,0,0,.3);
}
body.dark{--bg:var(--t-bg);--card:var(--t-card);--accent:var(--t-accent);--accent2:var(--t-accent2);--accent-hover:var(--t-accent-hover);--text:var(--t-text);--text-secondary:var(--t-text-secondary);--dim:var(--t-dim);--green:var(--t-green);--green-bg:var(--t-green-bg);--yellow:var(--t-yellow);--yellow-bg:var(--t-yellow-bg);--red:var(--t-red);--red-bg:var(--t-red-bg);--border:var(--t-border);--shadow:var(--t-shadow);--shadow-hover:var(--t-shadow-hover)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1rem;transition:background .3s,color .3s}
.header{text-align:center;padding:1.5rem 0 1.2rem;margin-bottom:1.5rem}
.header h1{font-size:2rem;font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,var(--accent),#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:var(--dim);margin-top:.35rem;font-size:.9rem}
#themeBtn{position:fixed;top:1rem;right:1rem;padding:.45rem 1rem;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:.85rem;z-index:99;box-shadow:var(--shadow);transition:all .2s}
#themeBtn:hover{box-shadow:var(--shadow-hover);transform:translateY(-1px)}
.tabs{display:flex;gap:.5rem;justify-content:center;margin-bottom:1.5rem}
.tab{padding:.65rem 1.6rem;border-radius:var(--radius-pill);cursor:pointer;border:2px solid transparent;background:transparent;color:var(--dim);font-size:.95rem;font-weight:500;transition:all .25s}
.tab:hover{color:var(--text);background:var(--accent2)}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(91,91,214,.3)}
.controls{display:flex;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
#searchInput{flex:1;min-width:180px;padding:.7rem 1rem;border-radius:var(--radius-btn);border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:.95rem;transition:border-color .2s,box-shadow .2s}
#searchInput:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,91,214,.12)}
#searchInput::placeholder{color:var(--dim)}
.stats{color:var(--dim);font-size:.85rem;white-space:nowrap}
.view-toggle{display:flex;gap:.3rem;align-items:center}
.view-btn{padding:.4rem .7rem;border-radius:9px;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--dim);font-size:.85rem;transition:all .2s}
.view-btn:hover{border-color:var(--accent);color:var(--accent)}
.view-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-filter{display:flex;gap:.4rem;margin-bottom:1.2rem;flex-wrap:wrap}
.cat-btn{padding:.4rem 1rem;border-radius:var(--radius-pill);cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--text-secondary);font-size:.82rem;font-weight:500;transition:all .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:.25rem}
.cat-btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
.cat-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(91,91,214,.25)}
.cat-count{font-size:.72rem;opacity:.75}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.word-card{background:var(--card);border-radius:var(--radius-card);padding:1.2rem;border-left:4px solid var(--accent);transition:transform .25s,box-shadow .25s;animation:fadeInUp .3s ease-out}
.word-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.word-card .top-row{display:flex;justify-content:space-between;align-items:flex-start}
.word-card .kanji{font-size:1.9rem;font-weight:800;letter-spacing:-.01em;line-height:1.1}
.word-card .speak-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;padding:4px 10px;border-radius:10px;transition:all .2s;opacity:.6}
.word-card .speak-btn:hover{opacity:1;background:var(--accent2);transform:scale(1.1)}
.word-card .reading{color:var(--yellow);font-size:1.1rem;margin:.15rem 0 .05rem;font-weight:600}
.word-card .romaji{color:var(--dim);font-size:.82rem;margin-bottom:.4rem;font-style:italic}
.word-card .meaning{color:var(--text-secondary);margin-bottom:.7rem;line-height:1.5}
.word-card .meaning .cat-tag{font-size:.68rem;padding:2px 7px;border-radius:6px;background:var(--accent2);color:var(--text-secondary);margin-left:.35rem;vertical-align:middle;font-weight:500}
.word-card .examples{display:flex;flex-direction:column;gap:.45rem}
.word-card .example{background:var(--accent2);padding:.6rem .9rem;border-radius:11px;font-size:.9rem;line-height:1.55;transition:background .2s}
.word-card .example:hover{background:rgba(91,91,214,.12)}
.word-card .example .ex-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem}
.word-card .example .ex-scene{font-size:.7rem;color:var(--dim);opacity:.8}
.word-card .example .ex-speak{cursor:pointer;font-size:.9rem;opacity:.5;transition:all .2s;padding:2px 4px;border-radius:6px}
.word-card .example .ex-speak:hover{opacity:1;transform:scale(1.15);background:rgba(0,0,0,.06)}
.word-card .example .jp{color:var(--green);font-weight:600}
.word-card .example .cn{color:var(--text-secondary);font-size:.85rem}
.word-card .ex-carousel{position:relative;margin-bottom:.4rem}
.word-card .ex-track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:.45rem;padding-bottom:.35rem;scrollbar-width:none;-ms-overflow-style:none}
.word-card .ex-track::-webkit-scrollbar{display:none}
.word-card .ex-track .example{min-width:calc(100% - .45rem);scroll-snap-align:start;flex-shrink:0}
.word-card .ex-dots{display:flex;gap:.3rem;justify-content:center;margin-top:.25rem}
.word-card .ex-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);opacity:.3;cursor:pointer;transition:all .2s}
.word-card .ex-dot.active{opacity:1;background:var(--accent);transform:scale(1.3)}
.word-card .related{margin-top:.65rem;padding:.55rem .8rem;background:var(--yellow-bg);border-left:3px solid var(--yellow);border-radius:0 9px 9px 0;font-size:.85rem;line-height:1.5}
.word-card .related .rel-word{color:var(--yellow);font-weight:700;cursor:pointer;transition:opacity .2s}
.word-card .related .rel-word:hover{opacity:.75;text-decoration:underline}
.word-card .related .rel-diff{color:var(--dim);font-size:.8rem;margin-top:.25rem}
.word-card .date{color:var(--dim);font-size:.73rem;margin-top:.6rem;text-align:right}
table.word-table{width:100%;border-collapse:collapse;font-size:.88rem;border-radius:12px;overflow:hidden}
table.word-table thead{position:sticky;top:0;z-index:1}
table.word-table th{background:var(--accent2);color:var(--text);padding:.65rem .55rem;text-align:left;font-weight:600;white-space:nowrap;font-size:.82rem;letter-spacing:.02em}
table.word-table td{padding:.55rem;border-bottom:1px solid var(--border);vertical-align:top}
table.word-table tbody tr{transition:background .15s}
table.word-table tbody tr:hover{background:rgba(91,91,214,.04)}
table.word-table .td-kanji{font-weight:700;white-space:nowrap;font-size:1rem}
table.word-table .td-kana{color:var(--yellow);white-space:nowrap;font-size:.85rem}
table.word-table .td-romaji{color:var(--dim);font-style:italic;font-size:.78rem;white-space:nowrap}
table.word-table .td-meaning{color:var(--text-secondary)}
table.word-table .td-cat{font-size:.7rem;padding:2px 7px;border-radius:6px;background:var(--accent2);white-space:nowrap;display:inline-block;color:var(--text-secondary)}
table.word-table .td-date{color:var(--dim);font-size:.73rem;white-space:nowrap}
table.word-table .td-speak{cursor:pointer;font-size:.9rem;padding:3px 5px;opacity:.5;transition:all .2s;border-radius:6px}
table.word-table .td-speak:hover{opacity:1;transform:scale(1.1);background:var(--accent2)}
table.word-table .td-related{font-size:.78rem;color:var(--yellow);cursor:pointer;font-weight:500}
table.word-table .td-related:hover{opacity:.7}
.empty{text-align:center;padding:3.5rem 1rem;color:var(--dim);font-size:1.05rem}
.empty-icon{font-size:3rem;margin-bottom:.8rem;opacity:.5}
#quizView{padding:.5rem 0}
.score-bar{display:flex;justify-content:center;gap:2.5rem;color:var(--dim);margin-bottom:1.2rem;font-size:.95rem}
.score-bar .num{color:var(--text);font-weight:700}
.mode-tabs{display:flex;gap:.4rem;justify-content:center;margin-bottom:1.5rem}
.mode-tab{padding:.45rem 1.1rem;border-radius:var(--radius-pill);cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--dim);font-size:.85rem;font-weight:500;transition:all .2s}
.mode-tab:hover{border-color:var(--accent);color:var(--accent)}
.mode-tab.active{background:var(--accent2);color:var(--text);border-color:var(--accent)}
.quiz-area{max-width:520px;margin:0 auto;text-align:center;padding:1.5rem .5rem 2rem}
.quiz-card{background:var(--card);border-radius:22px;padding:2.2rem 2rem;margin-bottom:1.5rem;box-shadow:var(--shadow);transition:box-shadow .3s}
.quiz-card:hover{box-shadow:var(--shadow-hover)}
.quiz-card .prompt-label{color:var(--dim);font-size:.88rem;margin-bottom:.5rem}
.quiz-card .prompt{font-size:2rem;font-weight:800;margin-bottom:.5rem;letter-spacing:-.01em;line-height:1.2}
.quiz-card .hint{color:var(--dim);font-size:.95rem}
.quiz-card .example-display{margin-top:.9rem;padding:.7rem;background:var(--green-bg);border-radius:12px;font-size:.9rem;line-height:1.6;border:1px solid rgba(34,197,94,.15);text-align:left}
.quiz-card .example-display .ex-label{color:var(--dim);font-size:.73rem;margin-bottom:.3rem;font-weight:600}
.quiz-card .example-display .ex-jp{color:var(--green);font-weight:600;font-size:.98rem}
.quiz-card .example-display .ex-cn{color:var(--text-secondary);font-size:.85rem;margin-top:.2rem}
.quiz-hear-btn{background:none;border:1.5px solid var(--border);color:var(--dim);padding:.35rem 1rem;border-radius:var(--radius-btn);cursor:pointer;font-size:.85rem;margin-top:.6rem;transition:all .2s;display:inline-flex;align-items:center;gap:.3rem}
.quiz-hear-btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
.mic-btn{width:80px;height:80px;border-radius:50%;border:3px solid var(--accent);background:transparent;color:var(--text);font-size:2rem;cursor:pointer;transition:all .25s;margin:.5rem;display:flex;align-items:center;justify-content:center}
.mic-btn:hover{background:var(--accent);color:#fff;transform:scale(1.05);box-shadow:0 4px 20px rgba(91,91,214,.35)}
.mic-btn.recording{background:var(--red);border-color:var(--red);color:#fff;animation:recordPulse 1.2s ease-in-out infinite}
@keyframes recordPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{transform:scale(1.08);box-shadow:0 0 0 12px rgba(239,68,68,0)}}
#recognized{margin-top:.5rem;color:var(--green);min-height:1.5rem;font-size:.92rem;font-weight:500}
.result{padding:1rem 1.2rem;border-radius:14px;margin-top:1rem;font-size:1.05rem;font-weight:600;transition:all .3s}
.result.correct{background:var(--green-bg);color:var(--green);border:1.5px solid rgba(34,197,94,.2);animation:resultBounce .4s ease-out}
.result.wrong{background:var(--red-bg);color:var(--red);border:1.5px solid rgba(239,68,68,.2)}
.result.show{background:var(--yellow-bg);color:var(--yellow);border:1.5px solid rgba(245,158,11,.2)}
@keyframes resultBounce{0%{transform:scale(.95)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
.next-btn{padding:.8rem 2.2rem;border-radius:var(--radius-pill);border:none;background:var(--accent);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:all .25s;margin-top:.5rem;box-shadow:0 2px 12px rgba(91,91,214,.25)}
.next-btn:hover{background:var(--accent-hover);transform:translateY(-2px);box-shadow:0 4px 16px rgba(91,91,214,.35)}
.skip-btn{padding:.55rem 1.3rem;border-radius:var(--radius-pill);border:1.5px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;font-size:.85rem;transition:all .2s;margin-top:.5rem}
.skip-btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
@media(max-width:640px){body{padding:.7rem}.header h1{font-size:1.65rem}.word-grid{grid-template-columns:1fr}.quiz-card{padding:1.6rem 1.2rem}.quiz-card .prompt{font-size:1.7rem}.controls{gap:.4rem}.cat-btn{padding:.35rem .75rem;font-size:.78rem}#themeBtn{top:.7rem;right:.7rem;padding:.35rem .8rem}#ttsBtn{top:.7rem;right:5.2rem;padding:.3rem .6rem;font-size:.8rem}.score-bar{gap:1.5rem}}
@media(max-width:400px){.header h1{font-size:1.4rem}.tab{padding:.55rem 1.2rem;font-size:.88rem}.quiz-card .prompt{font-size:1.5rem}}
</style>
</head>
<body>

<div class="header">
  <h1>🇯🇵 日本語単語帳</h1>
  <p>多邻国学日语的好帮手</p>
  <button id="themeBtn" onclick="app.toggleTheme()">🌙 暗色</button>
  <button id="ttsBtn" onclick="showTtsSettings()" style="position:fixed;top:1rem;right:6.5rem;padding:.4rem .75rem;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:.85rem;z-index:99;box-shadow:var(--shadow);transition:all .2s">🔊 TTS</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="app.switchTab('list')">📖 单词本</div>
  <div class="tab" onclick="app.switchTab('quiz')">🧠 记忆模式</div>
</div>

<div id="listView">
  <div class="controls">
    <input type="text" id="searchInput" placeholder="搜索单词/假名/罗马音/含义..." oninput="renderList()">
    <span class="stats" id="statsText">0 词</span>
    <div class="view-toggle">
      <div class="view-btn active" id="viewCard" onclick="app.setView('card')">🃏</div>
      <div class="view-btn" id="viewTable" onclick="app.setView('table')">📊</div>
    </div>
  </div>
  <div class="cat-filter" id="catFilter"></div>
  <div class="word-grid" id="wordGrid"></div>
  <table class="word-table" id="wordTable" style="display:none">
    <thead><tr><th></th><th>汉字</th><th>假名</th><th>罗马音</th><th>含义</th><th>分类</th><th>关联</th><th>日期</th></tr></thead>
    <tbody id="wordTableBody"></tbody>
  </table>
  <div class="empty" id="emptyMsg" style="display:none"><div class="empty-icon">📭</div>
    还没有单词，在飞书对话中发给 Coding 添加吧 💬</div>
</div>

<div id="quizView" style="display:none">
  <div class="score-bar">
    <span>✅ <span class="num" id="correctCount">0</span></span>
    <span>❌ <span class="num" id="wrongCount">0</span></span>
    <span>📋 <span class="num" id="totalCount">0</span></span>
  </div>
  <div class="mode-tabs">
    <div class="mode-tab active" id="modeWord" onclick="app.setQuizMode('word')">🔤 单词跟读</div>
    <div class="mode-tab" id="modeSentence" onclick="app.setQuizMode('sentence')">💬 例句跟读</div>
  </div>
  <div class="quiz-area">
    <div class="quiz-card">
      <div class="prompt-label" id="quizLabel">请说出这个单词的日语</div>
      <div class="prompt" id="quizPrompt">—</div>
      <div class="hint" id="quizHint"></div>
      <button class="quiz-hear-btn" id="quizHearBtn" onclick="app.hearQuiz()" style="display:none">🔊 先听正确读音</button>
      <div class="example-display" id="quizExample" style="display:none">
        <div class="ex-label">完整例句</div>
        <div class="ex-jp" id="quizExJp"></div>
        <div class="ex-cn" id="quizExCn"></div>
      </div>
    </div>
    <button class="mic-btn" id="micBtn" onclick="app.toggleMic()">🎤</button>
    <div id="recognized" style="margin-top:.5rem;color:var(--green);min-height:1.5rem"></div>
    <div class="result" id="quizResult" style="display:none"></div>
    <div style="margin-top:1rem">
      <button class="next-btn" id="nextBtn" onclick="app.nextWord()" style="display:none">下一个 ➜</button>
      <br>
      <button class="skip-btn" onclick="app.showAnswer()">不知道，看答案 👀</button>
    </div>
  </div>
</div>

<script>

(function(){
'use strict';
const $ = id => document.getElementById(id);
function escHtml(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function shuffle(arr){return[...arr].sort(()=>Math.random()-.5);}
function debounce(fn,ms){let t;return function(...a){clearTimeout(t);t=setTimeout(()=>fn.apply(this,a),ms);};}
// TTS Engine - supports native browser TTS and Azure TTS
let ttsConfig = {
  engine: localStorage.getItem('ttsEngine') || 'native',
  rate: parseFloat(localStorage.getItem('ttsRate')) || 0.85,
  pitch: parseFloat(localStorage.getItem('ttsPitch')) || 1.0,
  azureKey: localStorage.getItem('ttsAzureKey') || '',
  azureRegion: localStorage.getItem('ttsAzureRegion') || 'eastus'
};
let nativeVoice = null;

// Initialize TTS - find best Japanese voice
function initTTS() {
  if (!('speechSynthesis' in window)) return;
  const loadVoices = () => {
    const voices = speechSynthesis.getVoices();
    const prefs = ['Google 日本語', 'Microsoft Haruka', 'Microsoft Nanami', 'Yuna', 'Ichiro', 'Japanese'];
    for (const pref of prefs) {
      nativeVoice = voices.find(v => v.lang.includes('ja') && v.name.includes(pref));
      if (nativeVoice) break;
    }
    nativeVoice = nativeVoice || voices.find(v => v.lang.includes('ja')) || null;
  };
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

// Speak text
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  if (ttsConfig.engine === 'azure' && ttsConfig.azureKey) {
    speakAzure(text);
  } else {
    speakNative(text);
  }
}

function speakNative(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = ttsConfig.rate;
  u.pitch = ttsConfig.pitch;
  if (nativeVoice) u.voice = nativeVoice;
  speechSynthesis.speak(u);
}

// Azure TTS via REST API
async function speakAzure(text) {
  const tokenUrl = `https://${ttsConfig.azureRegion}.api.cognitive.microsoft.com/sts/v1.0/issueToken`;
  try {
    const tokenRes = await fetch(tokenUrl, {
      method: 'POST',
      headers: { 'Ocp-Apim-Subscription-Key': ttsConfig.azureKey, 'Content-Type': 'application/x-www-form-urlencoded' }
    });
    if (!tokenRes.ok) { speakNative(text); return; }
    const token = await tokenRes.text();
    const ssml = `<speak version='1.0' xmlns="http://www.w3.org/2001/10/synthesis" xml:lang='ja-JP'><voice name='ja-JP-NanamiNeural'>${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</voice></speak>`;
    const audioRes = await fetch(`https://${ttsConfig.azureRegion}.tts.speech.microsoft.com/cognitiveservices/v1`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/ssml+xml', 'Ocp-Apim-Subscription-Region': ttsConfig.azureRegion },
      body: ssml
    });
    if (audioRes.ok) {
      const blob = await audioRes.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.play();
      audio.onended = () => URL.revokeObjectURL(url);
    } else {
      const errorText = await audioRes.text();
      console.error('Azure TTS audio request failed:', audioRes.status, audioRes.statusText, errorText);
      speakNative(text);
    }
  } catch (e) {
    console.error('Azure TTS error:', e);
    speakNative(text);
  }
}

setQuizMode(mode){this.quizMode=mode;$('modeWord').classList.toggle('active',mode==='word');$('modeSentence').classList.toggle('active',mode==='sentence');this.startQuiz();},

startQuiz(){if(!this.words.length&&!ALL_GOJUON.length)return;this.correct=0;this.wrong=0;this.total=0;this.updateScore();this.buildQuizPool();this.nextWord();},

buildQuizPool(){
const ago=new Date();ago.setMonth(ago.getMonth()-1);
const travel=this.words.filter(w=>w.category==='旅游必懂'),others=this.words.filter(w=>w.category!=='旅游必懂');
const nT=travel.filter(w=>new Date(w.added)>=ago),oT=travel.filter(w=>new Date(w.added)<ago);
const nO=others.filter(w=>new Date(w.added)>=ago),oO=others.filter(w=>new Date(w.added)<ago);
if(this.quizMode==='sentence'){
const ex=[];this.words.forEach(w=>{(w.examples||[]).forEach(e=>ex.push({word:w,example:e}));});
this.quizWords=shuffle(ex).slice(0,20);this.quizWords.forEach(q=>{q.isSentence=true;q.isNew=new Date(q.word.added)>=ago;});this.currentIndex=0;return;
}
const pool=[];
shuffle(nT).slice(0,4).forEach(w=>pool.push({...w,isNew:true}));
shuffle(oT).slice(0,3).forEach(w=>pool.push({...w,isNew:false}));
shuffle(nO).slice(0,2).forEach(w=>pool.push({...w,isNew:true}));
shuffle(oO).slice(0,1).forEach(w=>pool.push({...w,isNew:false}));
const gj=shuffle(ALL_GOJUON).slice(0,10).map(g=>({kanji:g.k,reading:g.r,meaning:g.cn,examples:[],isNew:false,isKana:true}));
this.quizWords=shuffle([...pool,...gj]);this.currentIndex=0;
},

nextWord(){
if(!this.quizWords.length)this.buildQuizPool();
if(this.currentIndex>=this.quizWords.length){
$('quizPrompt').textContent='🎉 本轮结束！';
$('quizHint').textContent='正确 '+this.correct+'/'+this.total+'，错误 '+this.wrong+'/'+this.total;
$('quizLabel').textContent='点击下方按钮再来一轮';
$('quizResult').style.display='none';$('recognized').textContent='';
$('quizHearBtn').style.display='none';$('quizExample').style.display='none';$('micBtn').style.display='none';
$('nextBtn').style.display='inline-block';$('nextBtn').textContent='再来一轮 🔄';
$('nextBtn').onclick=()=>{this.startQuiz();$('micBtn').style.display='';$('nextBtn').textContent='下一个 ➜';$('nextBtn').onclick=()=>this.nextWord();};
return;
}
const q=this.quizWords[this.currentIndex];
$('quizResult').style.display='none';$('recognized').textContent='';$('nextBtn').style.display='none';$('micBtn').style.display='';
$('micBtn').classList.remove('recording');$('quizExample').style.display='none';

$('quizHearBtn').style.display='inline-block';
}},

normalize(s){return s.replace(/[\s。、！？!?,.\-「」『』（）()]/g,'').replace(/^(が|は|を|に|で|と|の|も|へ|から|まで)$/,'');},

fuzzyMatch(sp,tgt){
const c=this.normalize(sp),a=this.normalize(tgt);
if(c===a)return true;
if(c.length>=2&&(c.includes(a)||a.includes(c)))return true;
const cn=c.replace(/^(は|が|を|に|で|と|の|も|へ|って|には|では|とは|のも|にも|でも)$/,'');
const an=a.replace(/^(は|が|を|に|で|と|の|も|へ|って|には|では|とは|のも|にも|でも)$/,'');
if(cn&&an&&(cn===an||cn.includes(an)||an.includes(cn)))return true;
return false;
},

checkAnswer(spoken){
const q=this.quizWords[this.currentIndex];
let tgts,disp;
if(q.isSentence){tgts=[q.example.jp];disp=q.example.jp;}
else{tgts=[q.kanji,q.kana||q.reading,(q.kana||q.reading||'').replace(/[。]$/,'')];disp=q.kanji+'（'+q.reading+'）';}
const ok=spoken.some(s=>tgts.some(t=>this.fuzzyMatch(s,t)));
const result=$('quizResult');result.style.display='block';
if(ok){result.textContent='✅ 正确！'+disp;result.className='result correct';this.correct++;this.total++;speak(q.isSentence?q.example.jp:q.kanji);}
else{result.textContent='❌ 不对哦～ '+disp;result.className='result wrong';this.wrong++;this.total++;speak(q.isSentence?q.example.jp:q.kanji);}
this.updateScore();$('nextBtn').style.display='inline-block';this.currentIndex++;
if(q.isSentence){$('quizExJp').textContent=q.example.jp;$('quizExCn').textContent=q.example.cn;$('quizExample').style.display='block';}
},

updateScore(){$('correctCount').textContent=this.correct;$('wrongCount').textContent=this.wrong;$('totalCount').textContent=this.total;}
};

window.app=app;
if(localStorage.getItem('theme')==='dark'){document.body.classList.add('dark');$('themeBtn').textContent='☀️ 亮色';}
const dr=debounce(()=>app.renderList(),200);
$('searchInput').addEventListener('input',dr);
initTTS();
app.loadWords();
setInterval(()=>app.loadWords(),30000);
})();

</script>
</body>
